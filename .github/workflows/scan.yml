name: TA Job Radar Scan

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose scan or Telegram test"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - test
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: ta-job-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "test" ]; then
            python watcher.py test
          else
            python watcher.py scan
          fi
      - name: Save radar data
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'test') }}
        run: |
          if git diff --quiet data; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update job radar data"
          git push
