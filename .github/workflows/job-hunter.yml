name: Install Ultimate TA Job Radar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install final radar
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/radar.b64 <<'RADAR_PAYLOAD'
          
          
          
          
          
          RADAR_PAYLOAD

          tr -d '\n\r ' < /tmp/radar.b64 | base64 --decode > /tmp/radar.zip

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            -exec rm -rf {} +

          python - <<'PY'
          import zipfile
          with zipfile.ZipFile('/tmp/radar.zip') as z:
              z.extractall('.')
          PY

          rm -f .github/workflows/job-hunter.yml

      - name: Commit installed radar
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install Ultimate TA Job Radar"
          git push
